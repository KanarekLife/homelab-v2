# Loki datasource for Grafana. Picked up automatically by the kube-prometheus-
# stack Grafana sidecar (searchNamespace: ALL) via the grafana_datasource label,
# so the monitoring/grafana values do not need to be touched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        # SingleBinary mode + gateway disabled => the loki StatefulSet's
        # ClusterIP Service is named "loki" on port 3100 in the monitoring
        # namespace.
        url: http://loki.monitoring.svc:3100
        isDefault: false
        jsonData:
          maxLines: 1000
