defaultSettings:
  storageMinimalAvailablePercentage: "15"
  storageReservedPercentageForDefaultDisk: "15"
  # No thin over-provisioning: the schedulable pool is capped at physical disk
  # size so allocated == real backing capacity (clear visibility). Volumes were
  # shrunk to fit; large new volumes/rebuilds need space freed first.
  storageOverProvisioningPercentage: "100"
  # Throttle replica rebuilds: on this 3-node cluster a burst of concurrent
  # rebuilds (e.g. after a PVC clone/shrink) saturates a node's disk I/O and
  # starves the co-located etcd member, taking down the API/login. Heal one
  # replica at a time instead of the default of 3.
  concurrentReplicaRebuildPerNodeLimit: "1"

persistence:
  reclaimPolicy: Retain

defaultBackupStore:
  backupTarget: s3://homelab-nieradko-com-backup@eu-central-003/
  backupTargetCredentialSecret: longhorn-b2-backup-secret
  pollInterval: 360

metrics:
  serviceMonitor:
    enabled: true
