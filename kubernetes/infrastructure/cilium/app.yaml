apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.19.5
      helm:
        releaseName: cilium
        valueFiles:
          - $repo/kubernetes/infrastructure/cilium/meta/values.yaml
    - repoURL: https://github.com/kubernetes-sigs/gateway-api.git
      targetRevision: v1.5.1
      # Cilium 1.19's Gateway API controller requires TLSRoute served at
      # gateway.networking.k8s.io/v1alpha2, which only the experimental
      # channel provides (standard ships TLSRoute serving v1 only).
      path: config/crd/experimental
    - repoURL: https://github.com/KanarekLife/homelab-v2
      targetRevision: HEAD
      ref: repo
    - repoURL: https://github.com/KanarekLife/homelab-v2
      targetRevision: HEAD
      path: kubernetes/infrastructure/cilium/manifests
  destination:
    name: in-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
