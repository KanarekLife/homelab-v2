# grafana/alloy values — runs Alloy as a DaemonSet that tails pod logs and
# pushes them to Loki (loki.monitoring.svc:3100). Co-located with Loki/Grafana
# in the monitoring namespace. Lean resources for a memory-constrained cluster.
#
# We collect logs via the Kubernetes API (`loki.source.kubernetes`) rather than
# tailing host files. This avoids mounting host paths, which is the simplest
# reliable approach on Talos (read-only host, no docker, containerd log paths).

alloy:
  # Lean resources for the agent on each node.
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 256Mi
  # Don't phone home.
  enableReporting: false
  # Minimal log-collection pipeline in Alloy's River config syntax.
  configMap:
    create: true
    content: |-
      // Discover every pod in the cluster.
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Build the labels Loki will store for each log stream and drop pods that
      // aren't running (no logs to read).
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Completed"
          action        = "drop"
        }
        // Static source label so these streams are distinguishable in Loki.
        rule {
          target_label = "job"
          replacement  = "kubernetes-pods"
        }
      }

      // Tail container logs via the Kubernetes API for the discovered pods.
      // Only tail pods scheduled on THIS node so the DaemonSet shards the work.
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      // Ship to the in-cluster Loki single-binary service.
      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  # All three nodes are control-plane; tolerate every taint so the DaemonSet
  # covers every node (mirrors the node-exporter pattern in monitoring).
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

# The chart's default RBAC (read pods/pods/log/namespaces, nodes, etc.) is what
# loki.source.kubernetes needs; keep it enabled with the bundled rules.
rbac:
  create: true
serviceAccount:
  create: true
