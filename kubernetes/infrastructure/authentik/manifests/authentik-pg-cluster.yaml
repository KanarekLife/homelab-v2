apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg-cluster
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  # Promote a replica before updating the primary (rolling updates / node
  # drains switch over instead of restarting the primary in place) to minimize
  # write downtime.
  primaryUpdateMethod: switchover
  # Spread the 3 instances across distinct nodes so a node failure always
  # leaves a healthy replica to fail over to.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-pg-secret
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-pg-objectstore
