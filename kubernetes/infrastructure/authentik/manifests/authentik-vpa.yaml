# Recommend-only VPAs (updateMode: Off) for the authentik server + worker
# (Deployments created by the authentik Helm chart). Recommend-only: never
# mutates pods. Read: kubectl describe vpa -n authentik authentik-server
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: authentik-server
  namespace: authentik
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authentik-server
  updatePolicy:
    updateMode: "Off"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: authentik-worker
  namespace: authentik
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authentik-worker
  updatePolicy:
    updateMode: "Off"
