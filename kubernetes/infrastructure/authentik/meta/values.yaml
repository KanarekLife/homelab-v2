authentik:
  error_reporting:
    enabled: false

  postgresql:
    host: authentik-pg-cluster-rw
    name: authentik
    user: authentik

  email:
    host: smtp.purelymail.com
    port: 465
    username: sso@nieradko.com
    use_ssl: true
    from: "HomeLab SSO <sso@nieradko.com>"

server:
  # Guaranteed CPU so the server is not starved (and probe-killed) on a busy
  # node; no CPU limit so the CPU-heavy startup is not throttled.
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 768Mi
  env:
    - name: AUTHENTIK_POSTGRESQL__USERNAME
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: pg-username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: pg-password
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: secret-key
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: email-password
  route:
    main:
      enabled: true
      hostnames:
        - login.nieradko.com
      parentRefs:
        - name: default-gateway
          namespace: kube-system

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

worker:
  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      memory: 768Mi
  env:
    - name: AUTHENTIK_POSTGRESQL__USERNAME
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: pg-username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: pg-password
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: secret-key
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: email-password

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

redis:
  enabled: true
  master:
    kind: Deployment

    persistence:
      enabled: false

    resources:
      requests:
        memory: 30Mi
        cpu: 25m

  metrics:
    enabled: false
