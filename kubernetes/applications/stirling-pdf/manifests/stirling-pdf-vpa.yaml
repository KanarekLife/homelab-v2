# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n stirling-pdf stirling-pdf
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stirling-pdf-deployment
  updatePolicy:
    updateMode: "Off"
