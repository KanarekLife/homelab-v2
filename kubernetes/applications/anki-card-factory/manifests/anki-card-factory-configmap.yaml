apiVersion: v1
kind: ConfigMap
metadata:
  name: anki-card-factory-config
  namespace: anki-card-factory
data:
  # ── Data paths ── writable state + dict.sqlite live on the backed-up data
  # PVC mounted at /data. The 4.7Gi read-only audio collection is a separate
  # volume mounted at /audio (AUDIO_ROOT below).
  QUEUE_DB: /data/queue.sqlite
  JOBS_DB: /data/jobs.sqlite
  MEDIA_DIR: /data/media
  DICT_DB: /data/dict.sqlite
  DB_DRIVER: sqlite

  # ── Word audio ── themoeway local-audio collection, mounted read-only.
  AUDIO_ROOT: /audio

  # ── Dictionaries ── titles EXACTLY as stored in dict.sqlite (verified by
  # querying the DB). Wrong titles silently return no hits.
  MEANING_DICTS: "Jitendex.org [2026-05-05],JMdict"
  PITCH_DICT: "アクセント辞典"
  FREQ_DICT: "JPDBv2㋕"

  # ── LLM (OpenRouter) ── OPENROUTER_API_KEY comes from the ExternalSecret.
  # The model is NOT set here: it's chosen at runtime in Admin → LLM models
  # (Load free models → Benchmark → Use) and persists to data/llm-selection.json
  # on the data PVC. With no model selected the LLM degrades to a deterministic
  # heuristic gloss, so pick one in the UI after deploy.

  # ── TTS ── ElevenLabs (hosted; no sidecar, suits the at-capacity cluster).
  # Matches the local setup. ELEVENLABS_API_KEY comes from the ExternalSecret.
  # eleven_flash_v2_5 handles Japanese; stability/similarity/etc. left at app
  # defaults (0.5/0.75/0/1, speaker-boost on).
  TTS_PROVIDER: elevenlabs
  ELEVENLABS_VOICE: WQz3clzUdMqvBf0jswZQ
  ELEVENLABS_MODEL: eleven_flash_v2_5

  # ── OIDC login (Authentik) ── the non-secret half. The four OIDC_* values
  # plus SESSION_SECRET (in the ExternalSecret) gate /api behind Authentik login.
  # OIDC_CLIENT_ID / OIDC_CLIENT_SECRET / SESSION_SECRET come from the Secret.
  OIDC_ISSUER: https://login.nieradko.com/application/o/anki-card-factory/
  OIDC_REDIRECT_URL: https://anki.nieradko.com/api/auth/callback

  # ── OIDC back-channel reroute ── login.nieradko.com is split-horizon: it
  # resolves to the public WAN IP, which pods can't hairpin back to, so
  # server-side OIDC (discovery + token exchange + JWKS) would time out and the
  # app fails CLOSED. This reroutes those calls straight to authentik's
  # in-cluster service while keeping SNI/Host = the issuer (so the discovered
  # `iss` still matches and the browser redirect stays public). authentik's
  # internal cert won't match the issuer host, so the app skips cert verification
  # on this in-cluster hop — token authenticity is still enforced via JWKS.
  # Replaces the old hostAlias → gateway-LB workaround.
  OIDC_BACKCHANNEL_HOST: authentik-server.authentik.svc.cluster.local:443

  # First/allowlisted admin. Matching email is granted admin role on login.
  ADMIN_EMAILS: stanislaw@nieradko.com
