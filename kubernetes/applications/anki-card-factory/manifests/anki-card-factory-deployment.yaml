apiVersion: apps/v1
kind: Deployment
metadata:
  name: anki-card-factory-deployment
  namespace: anki-card-factory
spec:
  replicas: 1
  strategy:
    # MANDATORY for an RWO Longhorn volume: a rolling update would deadlock on a
    # Multi-Attach error. Recreate detaches the old pod before the new attaches.
    type: Recreate
  selector:
    matchLabels:
      app: anki-card-factory
  template:
    metadata:
      labels:
        app: anki-card-factory
    spec:
      # Keep this pod off talos-oug-a0q: that node is chronically overloaded and
      # flaps, so even a Ready pod there is unreachable — the gateway's Envoy gets
      # "upstream connect error / connection timed out" and anki.nieradko.com goes
      # down. Schedule on a healthy node so the backend stays reachable.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["talos-oug-a0q"]
      # OIDC split-horizon (login.nieradko.com unreachable from pods) is handled
      # in-app via OIDC_BACKCHANNEL_HOST in the ConfigMap, which reroutes the
      # server-side OIDC calls to authentik's in-cluster service. No hostAlias
      # needed.
      containers:
        - name: anki-card-factory
          image: ghcr.io/kanareklife/anki-card-factory:sha-b5abe69
          env:
            - name: TZ
              value: "Europe/Warsaw"
            - name: PORT
              value: "8000"
          envFrom:
            - configMapRef:
                name: anki-card-factory-config
            - secretRef:
                name: anki-card-factory-secret
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
            - name: audio
              mountPath: /audio
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            # Requests stay low: the cluster is at capacity, so we don't reserve
            # scarce headroom. Limits are raised generously — a CPU *limit* reserves
            # nothing, it just lets generation burst above half a core instead of
            # being throttled. Idle draw is ~1m/119Mi; generation is the spiky part.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: anki-card-factory-data-pvc
        - name: audio
          persistentVolumeClaim:
            claimName: anki-card-factory-audio-pvc
