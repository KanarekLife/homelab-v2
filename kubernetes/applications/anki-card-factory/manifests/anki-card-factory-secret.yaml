# Secrets via External Secrets Operator → Bitwarden Secrets Manager (same
# pattern as media/komga). Produces a Secret named `anki-card-factory-secret`
# that the Deployment consumes via envFrom → secretRef.
#
# PREREQUISITE (manual, one-time): create an OAuth2/OpenID provider + application
# in Authentik (https://login.nieradko.com) with:
#   - redirect URI:  https://anki.nieradko.com/api/auth/callback
#   - scopes:        openid email profile
# then store its client-id and client-secret, plus a freshly generated
# SESSION_SECRET (`openssl rand -hex 32`), in Bitwarden Secrets Manager and
# paste their UUIDs below. Until these three UUIDs are real, this ExternalSecret
# will not sync and the pod will stay Pending on the missing Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anki-card-factory-secret
  namespace: anki-card-factory
  annotations:
    argocd.argoproj.io/sync-options: Prune=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: anki-card-factory-secret
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: "{{ .oidcClientId }}"
        OIDC_CLIENT_SECRET: "{{ .oidcClientSecret }}"
        SESSION_SECRET: "{{ .sessionSecret }}"
        # OPENROUTER_API_KEY: "{{ .openrouterApiKey }}"   # add when LLM is wired
  data:
    - secretKey: oidcClientId
      remoteRef:
        key: a6819e0e-d7b7-4fd8-8725-b47400fc5b62
    - secretKey: oidcClientSecret
      remoteRef:
        key: 7cb0c4d6-2000-4845-b0a4-b47400fc7055
    - secretKey: sessionSecret
      remoteRef:
        key: 1c43107b-59e6-4fff-afe5-b47400fd2e20
    # - secretKey: openrouterApiKey
    #   remoteRef:
    #     key: REPLACE_WITH_BITWARDEN_UUID_OPENROUTER_API_KEY
