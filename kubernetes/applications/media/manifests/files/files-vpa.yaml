# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n media files
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: files
  namespace: media
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: files-deployment
  updatePolicy:
    updateMode: "Off"
