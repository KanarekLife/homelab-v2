# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n media flaresolverr
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: flaresolverr
  namespace: media
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flaresolverr-deployment
  updatePolicy:
    updateMode: "Off"
