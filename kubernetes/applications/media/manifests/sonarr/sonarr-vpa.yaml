# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n media sonarr
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sonarr
  namespace: media
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sonarr-deployment
  updatePolicy:
    updateMode: "Off"
