# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n media downloads
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: downloads
  namespace: media
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: downloads-deployment
  updatePolicy:
    updateMode: "Off"
