apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloads-deployment
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: downloads
  template:
    metadata:
      labels:
        app: downloads
    spec:
      containers:
        - name: downloads
          image: linuxserver/transmission:4.1.2
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: run
              mountPath: /run
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Warsaw
            - name: PEERPORT
              valueFrom:
                fileKeyRef:
                  key: PORTS
                  path: forwarded_port.env
                  volumeName: vpn-stats
                  optional: true
          livenessProbe:
            exec:
              command:
                - transmission-remote
                - -pt
            initialDelaySeconds: 60 # Gives Transmission time to fully start before first check
            periodSeconds: 120 # Checks every 2 minutes to avoid spamming the external port-checker
            timeoutSeconds: 10 # Fails the check if the command takes longer than 10s
            failureThreshold: 3 # Restarts the pod only after 3 consecutive failures
          ports:
            - name: web-ui
              containerPort: 9091
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
        - name: vpn
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: proton-vpn-secret
                  key: privatekey-p2p
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "9091"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_UP_COMMAND
              # Write the env file atomically (temp file + mv on the same volume) so the
              # kubelet never reads an empty/half-written file while resolving the
              # transmission PEERPORT fileKeyRef. The single quotes around the value are
              # REQUIRED by the k8s env-file parser (VAR='value'); do not remove them.
              value: >-
                /bin/sh -c "echo PORTS=\'{{PORTS}}\' > /tmp/gluetun/forwarded_port.env.tmp && mv /tmp/gluetun/forwarded_port.env.tmp /tmp/gluetun/forwarded_port.env"
          volumeMounts:
            - mountPath: /tmp/gluetun
              name: vpn-stats
          readinessProbe:
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            initialDelaySeconds: 15 # Gives the VPN 15s to handshake first
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3 # Allows 3 strikes before killing the pod
          livenessProbe:
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            initialDelaySeconds: 30 # Gives plenty of time for initial setup
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3 # Allows 3 strikes before killing the pod
          lifecycle:
            postStart:
              exec:
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "(ip rule del table 51820; ip -6 rule del table 51820) || true",
                  ]
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: downloads-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: run
          emptyDir: {}
        - name: vpn-stats
          emptyDir: {}
