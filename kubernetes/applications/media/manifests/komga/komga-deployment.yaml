apiVersion: apps/v1
kind: Deployment
metadata:
  name: komga-deployment
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: komga
  template:
    metadata:
      labels:
        app: komga
    spec:
      # temporary: prefer to keep off overloaded oug node
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - talos-oug-a0q
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: komga
          image: ghcr.io/gotson/komga:1.24.4
          env:
            - name: TZ
              value: "Europe/Warsaw"
            - name: KOMGA_DATABASE_CHECKLOCALFILESYSTEM
              value: "false"
            - name: KOMGA_TASKSDB_CHECKLOCALFILESYSTEM
              value: "false"
            - name: KOMGA_OIDCEMAILVERIFICATION
              value: "false"
            - name: KOMGA_AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: komga-secret
                  key: authentik-clientid
            - name: KOMGA_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: komga-secret
                  key: authentik-clientsecret
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: oauth-config
              mountPath: /config/application.yaml
              subPath: application.yaml
          ports:
            - containerPort: 25600
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 32m
              # komga (JVM) scans libraries at ~975Mi resident; request reflects
              # that real working set so the scheduler does not co-locate it with
              # other heavy pods, and the limit leaves OOM headroom above peak.
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: komga-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: komga-data-pvc
        - name: oauth-config
          configMap:
            name: komga-oauth-config
