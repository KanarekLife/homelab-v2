apiVersion: apps/v1
kind: Deployment
metadata:
  name: komga-deployment
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: komga
  template:
    metadata:
      labels:
        app: komga
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: komga
          image: ghcr.io/gotson/komga:1.24.4
          env:
            - name: TZ
              value: "Europe/Warsaw"
            - name: KOMGA_DATABASE_CHECKLOCALFILESYSTEM
              value: "false"
            - name: KOMGA_TASKSDB_CHECKLOCALFILESYSTEM
              value: "false"
            - name: KOMGA_OIDCEMAILVERIFICATION
              value: "false"
            - name: KOMGA_AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: komga-secret
                  key: authentik-clientid
            - name: KOMGA_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: komga-secret
                  key: authentik-clientsecret
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: oauth-config
              mountPath: /config/application.yaml
              subPath: application.yaml
          ports:
            - containerPort: 25600
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: komga-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: komga-data-pvc
        - name: oauth-config
          configMap:
            name: komga-oauth-config
