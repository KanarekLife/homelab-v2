# Recommend-only VPA (updateMode: Off). Read: kubectl describe vpa -n media komga
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: komga
  namespace: media
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: komga-deployment
  updatePolicy:
    updateMode: "Off"
